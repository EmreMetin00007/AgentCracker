name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff pip-audit

      - name: Lint with ruff
        run: ruff check hackeragent/ mcp-servers/ scripts/

      - name: Run tests
        run: python -m pytest hackeragent/tests/ -v --tb=short

      - name: Validate config schema
        run: hackeragent --validate-config

      - name: List workflows
        run: hackeragent --list-workflows

      - name: Security audit (dependencies)
        run: pip-audit --requirement requirements.txt --desc off --ignore-vuln GHSA-noop-ignore-this
        continue-on-error: true

  build-package:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install --upgrade pip build
          python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hackeragent-dist
          path: dist/
