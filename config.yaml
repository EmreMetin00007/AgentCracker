# HackerAgent v3.0 — Merkezi Konfigürasyon
# ============================================================
# Bu dosya repo varsayılanıdır. Kullanıcıya özel ayarlar için
#   ~/.hackeragent/config.yaml
# dosyasını oluşturun; oradaki değerler burayı override eder.
#
# Environment variable öncelik sırası:
#   OPENROUTER_API_KEY  (en yüksek)  >  ~/.hackeragent/config.yaml  >  bu dosya
#
# Hassas anahtarları burada TUTMAYIN — .env dosyası veya env var kullanın.
# ============================================================

hackeragent:
  version: "3.0"
  # Tüm veri dizini (DB, loglar, RAG, approvals). HACKERAGENT_HOME env var'ı
  # ile override edilebilir.
  data_dir: "~/.hackeragent"

llm:
  provider: openrouter
  base_url: "https://openrouter.ai/api/v1"
  # API key'i BURAYA yazmak yerine .env veya ~/.hackeragent/config.yaml kullanın
  openrouter_api_key: ""
  models:
    orchestrator: "qwen/qwen3.6-plus"
    analyzer: "qwen/qwen3.6-plus"
    exploit_gen: "nousresearch/hermes-4-405b"
    report: "qwen/qwen3.6-plus"
    # Akıllı model router katmanları (opsiyonel).
    # Boş bırakırsanız cheap → orchestrator, premium → exploit_gen'e düşer.
    # Örnek maliyet odaklı config:
    #   cheap:    "qwen/qwen3-8b-instruct"   (~$0.05/1M)
    #   premium:  "anthropic/claude-3.5-sonnet"
    cheap: ""
    premium: ""
  max_tokens: 4096
  temperature: 0.3
  timeout_seconds: 120
  max_tool_iterations: 25
  tool_timeout_seconds: 300
  # Streaming (token-by-token) — REPL'de anında çıktı
  streaming: true
  # Session bazlı maksimum OpenRouter maliyeti (USD). 0 = sınırsız.
  # Bu limite ulaşıldığında orkestratör durur.
  max_session_cost_usd: 0.0
  # Akıllı model router — heuristik tier seçimi (cheap/standard/premium).
  # Basit sohbet → cheap, exploit/rapor → premium, default → standard.
  router_enabled: true
  # Opsiyonel: heuristik yerine LLM-based classifier kullan. Her yeni user
  # mesajı için ucuz LLM'e "cheap/standard/premium?" diye sorulur ve sonuç
  # 30sn cache'lenir. Heuristiğin karar kalitesi yetersizse devreye alın.
  router_llm_classifier: false
  router_classifier_cache_ttl: 30
  # Self-reflection — tool fail sonrası LLM'e ucuz "düzelt" nudge'ı enjekte et.
  self_reflection_enabled: true
  # Tool cache — aynı (tool, args) çağrısını TTL süresince MCP'ye göndermeden döndür.
  tool_cache_enabled: true
  # Prompt compression — bağlam X karakteri aşarsa eski turları ucuz LLM ile özetle.
  compression_enabled: true
  compression_threshold_chars: 40000
  compression_keep_tail: 10
  # Planner — kompleks kullanıcı görevlerini adımlara böl (cheap LLM ile).
  planner_enabled: true
  planner_max_steps: 6
  # Vision / multimodal — browser_screenshot sonuçlarını vision-capable modele image olarak gönder.
  vision_enabled: true
  # OpenRouter prompt caching (ephemeral) — system + tools schema cache'lenir
  # Destekleyen provider'larda (Anthropic Claude, OpenAI o1+, Gemini) %50+ input
  # token tasarrufu sağlar. Diğer provider'lar sessizce görmezden gelir.
  prompt_cache_enabled: false

# RAG-enhanced context — her kullanıcı mesajından önce rag-engine + memory-server
# sorgularıyla ilgili kayıtları system ctx olarak enjekte eder.
rag:
  auto_enrich: true

# MCP server tanımları — her biri stdio transport üzerinden subprocess
# olarak başlatılır. `enabled: false` ile tek tek devre dışı bırakabilirsiniz.
mcp_servers:
  kali-tools:
    enabled: true
    command: "python3"
    args: ["mcp-servers/mcp-kali-tools/server.py"]
  memory-server:
    enabled: true
    command: "python3"
    args: ["mcp-servers/mcp-memory-server/server.py"]
  ctf-platform:
    enabled: true
    command: "python3"
    args: ["mcp-servers/mcp-ctf-platform/server.py"]
    env:
      CTFD_URL: ""
      CTFD_TOKEN: ""
      HTB_TOKEN: ""
      THM_TOKEN: ""
  telemetry:
    enabled: true
    command: "python3"
    args: ["mcp-servers/mcp-telemetry/server.py"]
  rag-engine:
    enabled: true
    command: "python3"
    args: ["mcp-servers/mcp-rag-engine/server.py"]
  # Opsiyonel — playwright tabanlı browser (screenshot, form keşfi, vision)
  # Etkinleştirmek için: pip install playwright && playwright install chromium
  browser:
    enabled: false
    command: "python3"
    args: ["mcp-servers/mcp-browser/server.py"]
  # Modern Web Advanced + API saldırı araçları (Paket 1 + 2)
  # GraphQL, JWT, OAuth/SAML, HTTP smuggling, cache poisoning, prototype
  # pollution, race condition, WebSocket + OpenAPI/Postman ingest,
  # API route fuzz, param discovery, NoSQLi, IDOR matrix, rate bypass,
  # formula injection.
  web-advanced:
    enabled: true
    command: "python3"
    args: ["mcp-servers/mcp-web-advanced/server.py"]

safety:
  # Bu operasyon tipleri için MCP kali-tools request_approval'ı zorunlu kılınır.
  require_approval: ["exploit", "lateral_movement", "flag_submit"]
  rate_limit_rps: 10
  # Paralel tool yürütme — aynı turda birden fazla güvenli tool_call koşturulur.
  # Güvensiz tool'lar (exploit, request_approval, submit_flag, store_*) sıralı koşar.
  parallel_tool_execution: true
  parallel_max_workers: 5
  # Scope enforcement — scope dışı host'lara yapılan tool çağrıları engellenir.
  # CLI'dan `--scope 10.10.10.5` veya REPL'de `/scope add ...` ile yönetilebilir.
  scope_enforcement: true
  scope:
    # - "10.10.10.0/24"
    # - "*.example.com"
    # - "ctf.lab"

logging:
  level: "INFO"
  # Boş bırakırsanız sadece stderr'e yazılır. Varsayılan:
  # file: "~/.hackeragent/logs/agent.log"
  file: ""

# 🔔 Webhook notifications — kritik bulgular için push bildirim
# Discord, Slack veya generic JSON webhook destekler. Hepsini boş bırakırsanız
# notifier devre dışı kalır.
notifications:
  enabled: false
  # Discord webhook (Server Settings → Integrations → Webhooks)
  discord_webhook: ""
  # Slack webhook (api.slack.com/apps → Incoming Webhooks)
  slack_webhook: ""
  # Generic JSON POST — {title, body, severity, timestamp, source}
  generic_webhook: ""
  # Hangi severity seviyeleri bildirim yaratır? (critical/high/medium/low/info)
  severities: ["critical", "high"]
  # Aynı başlığın tekrar bildirilmeme süresi (saniye)
  dedupe_window_seconds: 300
  timeout_seconds: 5
